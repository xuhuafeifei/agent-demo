<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-layout">
        <aside class="tool-sidebar">
            <div class="tool-log-panel">
                <div class="tool-log-header">
                    <span>工具调用日志</span>
                    <button class="btn btn-secondary" id="clear-tool-log-btn">清空</button>
                </div>
                <ul class="tool-log-list" id="tool-log-list"></ul>
            </div>
        </aside>
        <div class="container">
            <div class="header">
                <h1>Agent Demo</h1>
                <p>使用 @mariozechner/pi-agent-core 的简单对话应用 - 支持流式输出</p>
            </div>

            <div class="retry-banner" id="retry-banner" role="status" aria-live="polite"></div>

            <div class="chat-container" id="chat-container">
                <div class="message assistant">
                    <div class="avatar">A</div>
                    <div class="content">
                        您好！我是您的 AI 助手。有什么我可以帮助您的吗？
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <textarea
                        id="message-input"
                        placeholder="输入您的消息..."
                        rows="1"
                    ></textarea>
                    <button id="send-btn">➤</button>
                </div>
                <div class="controls">
                    <button class="btn btn-secondary" id="clear-btn">清除历史</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
