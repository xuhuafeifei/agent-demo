<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Demo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="header-left">
          <div>
            <h1>Agent Demo</h1>
            <p>左侧对话与调试时间线，右侧任务调度面板（预留）</p>
          </div>
          <nav class="view-switch" aria-label="视图切换">
            <button class="view-switch-btn is-active" data-route="#chat">聊天</button>
            <button class="view-switch-btn" data-route="#config">配置</button>
          </nav>
        </div>
        <div class="header-actions">
          <button class="btn btn-secondary" id="clear-btn">清除历史</button>
        </div>
      </header>

      <main class="main-layout" id="main-layout">
        <div class="workspace-column">
          <section id="chat-view" class="chat-panel">
            <div class="chat-container" id="chat-container"></div>

            <div class="input-container">
            <div class="input-wrapper">
              <textarea
                id="message-input"
                placeholder="Plan, @ for context, / for commands"
                rows="1"
              ></textarea>
              <div class="input-toolbar">
                <div class="toolbar-left">
                  <button class="toolbar-btn pill-btn">
                    <svg
                      width="14"
                      height="14"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <path
                        d="M8 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm8 0a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"
                      />
                    </svg>
                    Agent
                    <svg
                      width="12"
                      height="12"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                  </button>
                  <button class="toolbar-btn text-btn">
                    Gemini 3.1 Pro
                    <svg
                      width="12"
                      height="12"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                  </button>
                </div>
                <div class="toolbar-right">
                  <div class="context-indicator" title="0% context used">
                    <svg width="16" height="16" viewBox="0 0 36 36">
                      <circle
                        cx="18"
                        cy="18"
                        r="14"
                        fill="none"
                        stroke="#e2e8f0"
                        stroke-width="4"
                      ></circle>
                      <circle
                        cx="18"
                        cy="18"
                        r="14"
                        fill="none"
                        stroke="#94a3b8"
                        stroke-width="4"
                        stroke-dasharray="88"
                        stroke-dashoffset="88"
                        transform="rotate(-90 18 18)"
                      ></circle>
                    </svg>
                  </div>
                  <button class="icon-btn">
                    <svg
                      width="18"
                      height="18"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <rect
                        x="3"
                        y="3"
                        width="18"
                        height="18"
                        rx="2"
                        ry="2"
                      ></rect>
                      <circle cx="8.5" cy="8.5" r="1.5"></circle>
                      <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                  </button>
                  <button class="icon-btn mic-btn">
                    <svg
                      width="16"
                      height="16"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <path
                        d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"
                      ></path>
                      <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                      <line x1="12" y1="19" x2="12" y2="22"></line>
                    </svg>
                  </button>
                  <button id="send-btn" class="icon-btn send-btn">
                    <svg
                      width="16"
                      height="16"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <line x1="22" y1="2" x2="11" y2="13"></line>
                      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                  </button>
                </div>
              </div>
            </div>
            </div>
          </section>
        </div>

        <aside class="scheduler-panel">
          <div class="scheduler-header">
            <h2>任务调度</h2>
            <span class="scheduler-status">空壳模式</span>
          </div>
          <div class="scheduler-filter-row">
            <button
              class="btn btn-secondary scheduler-filter active"
              data-filter="all"
            >
              全部
            </button>
            <button
              class="btn btn-secondary scheduler-filter"
              data-filter="pending"
            >
              待执行
            </button>
            <button
              class="btn btn-secondary scheduler-filter"
              data-filter="running"
            >
              执行中
            </button>
            <button
              class="btn btn-secondary scheduler-filter"
              data-filter="done"
            >
              已完成
            </button>
          </div>
          <div class="scheduler-list" id="scheduler-list"></div>
          <div class="scheduler-detail" id="scheduler-detail">
            <h3>任务详情</h3>
            <p>选择右侧任务项查看详情。</p>
          </div>
          <div class="scheduler-actions">
            <button class="btn btn-secondary" id="scheduler-refresh-btn">
              刷新
            </button>
            <button class="btn btn-secondary" id="scheduler-new-btn">
              新建任务
            </button>
          </div>
        </aside>
      </main>

      <section id="config-view" class="config-panel hidden">
        <div class="config-view-shell">
          <div class="config-hero">
            <div>
              <h2>配置中心</h2>
              <p>直观调节 `fgbg.json` 的核心设置并保存到后端。</p>
            </div>
            <div class="config-hero-actions">
              <button id="config-refresh-btn" class="btn btn-secondary" type="button">刷新配置</button>
              <button id="config-reset-btn" class="btn btn-secondary" type="button">恢复默认</button>
            </div>
          </div>

          <div class="config-meta-strip">
            <span class="meta-chip" id="config-meta-updated">等待加载</span>
            <span class="meta-chip" id="config-meta-state">缓存状态：未加载</span>
          </div>
          <div class="config-default-strip" id="config-default-strip">
            <p>默认项将自动补齐，清除后端会重新应用系统默认。</p>
          </div>

          <div class="config-cards" id="config-cards">
            <p class="muted">正在加载配置...</p>
          </div>

          <div class="config-toolbar">
            <button id="config-save-btn" class="btn btn-primary" type="button" disabled>保存变更</button>
            <button id="config-revert-btn" class="btn btn-secondary" type="button" disabled>撤销修改</button>
          </div>

          <div class="config-toast hidden" id="config-toast" role="status"></div>
        </div>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
