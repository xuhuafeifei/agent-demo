<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell" id="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="主导航">
        <div class="sidebar-header">
          <div class="brand">
            <div class="brand-logo">A</div>
            <div class="brand-text">
              <div class="brand-title">Agent Demo</div>
            </div>
          </div>
          <button
            id="sidebar-toggle"
            class="icon-button"
            type="button"
            aria-label="切换侧边栏"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
          </button>
        </div>

        <nav class="sidebar-nav">
          <button class="nav-item nav-item-active" data-label="聊天" type="button" aria-label="聊天">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
              </svg>
            </span>
            <span class="nav-text">聊天</span>
          </button>
          <button class="nav-item" data-label="概览" type="button" aria-label="概览">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 3h7v7H3zM14 3h7v4h-7zM14 10h7v11h-7zM3 14h7v7H3z"></path>
              </svg>
            </span>
            <span class="nav-text">概览</span>
          </button>
          <button class="nav-item" data-label="频道" type="button" aria-label="频道">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 5h16M4 12h16M4 19h16"></path>
              </svg>
            </span>
            <span class="nav-text">频道</span>
          </button>
          <button class="nav-item" data-label="实例" type="button" aria-label="实例">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polyline>
              </svg>
            </span>
            <span class="nav-text">实例</span>
          </button>
          <button class="nav-item" data-label="会话" type="button" aria-label="会话">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M12 6v6l4 2"></path>
              </svg>
            </span>
            <span class="nav-text">会话</span>
          </button>
          <button class="nav-item" data-label="设置" type="button" aria-label="设置">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33"></path>
              </svg>
            </span>
            <span class="nav-text">设置</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <span class="version">v1.0.0</span>
          <span class="status-dot" aria-hidden="true"></span>
        </div>
      </aside>

      <div class="main-shell">
        <header class="header">
          <div class="breadcrumb">
            <span>Agent Demo</span>
            <span class="sep">›</span>
            <span>聊天</span>
          </div>
          <div class="header-actions">
            <button id="search-btn" class="search-box" type="button" aria-label="搜索">
              <span>搜索</span>
              <kbd>⌘K</kbd>
            </button>
            <button class="icon-button" type="button" aria-label="浅色模式">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5"></circle>
                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
              </svg>
            </button>
          </div>
        </header>

        <main class="chat-main">
          <div class="chat-scroll" id="chat-scroll">
            <div class="chat-thread" id="chat-thread"></div>
          </div>

          <section class="input-wrap">
            <div class="input-card" id="input-card">
              <textarea
                id="message-input"
                class="input-textarea"
                rows="1"
                placeholder="继续提问，或输入 @ 来引用内容"
              ></textarea>
              <div class="input-actions">
                <div class="left-tools">
                  <button class="tool-button" type="button" aria-label="提及">@</button>
                  <button class="tool-button" type="button" aria-label="上传附件">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M21.44 11.05l-8.49 8.49a6 6 0 0 1-8.49-8.49l8.48-8.48a4 4 0 0 1 5.66 5.66l-8.49 8.48a2 2 0 0 1-2.83-2.83l7.78-7.78"></path>
                    </svg>
                  </button>
                </div>
                <div class="right-tools">
                  <button class="model-button" type="button" aria-label="模型选择">
                    <span>⚙ 最佳</span>
                  </button>
                  <button id="send-btn" class="send-button send-button-disabled" type="button" aria-label="发送消息">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <line x1="12" y1="19" x2="12" y2="5"></line>
                      <polyline points="5 12 12 5 19 12"></polyline>
                    </svg>
                  </button>
                </div>
              </div>
            </div>
            <p class="input-hint">内容由 AI 生成仅供参考</p>
          </section>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
